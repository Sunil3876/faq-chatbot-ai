<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans flex items-center justify-center min-h-screen p-4">

    <div
        class="w-full max-w-lg bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[600px]">

        <div class="bg-gray-800/50 p-4 border-b border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                <div>
                    <h1 class="text-md font-bold tracking-wide">TechCorp AI Support</h1>
                    <p class="text-xs text-gray-400">Semantic RAG Engine Active</p>
                </div>
            </div>
            <span class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-300 font-mono">v2.0</span>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 custom-scrollbar">
            <div class="flex justify-start">
                <div class="bg-gray-800 text-gray-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-md">
                    Hello! I am your advanced AI Assistant. Ask me anything about accounts, refunds, shipping, or
                    technical support.
                </div>
            </div>
        </div>

        <div id="typing-indicator" class="px-4 py-2 hidden">
            <div class="flex items-center gap-1 bg-gray-800/40 w-16 p-2 rounded-xl justify-center">
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
            </div>
        </div>

        <div class="p-3 border-t border-gray-800 bg-gray-900/50">
            <div class="flex gap-2">
                <input type="text" id="user-input"
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500 transition-colors"
                    placeholder="Type your enterprise query...">
                <button onclick="sendMessage()"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2.5 rounded-xl text-sm transition-all shadow-lg active:scale-95 cursor-pointer">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const typingIndicator = document.getElementById("typing-indicator");

        // Listen for Enter Key
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Render User Message
            userInput.value = "";
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-emerald-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-md">
                        ${message}
                    </div>
                </div>
            `;
            scrollToBottom();

            // 2. Show Typing Indicator
            typingIndicator.classList.remove("hidden");
            scrollToBottom();

            try {
                // 3. API Call to FastAPI Backend
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Hide Typing Indicator
                typingIndicator.classList.add("hidden");

                // 4. Render Bot Response
                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-gray-800 text-gray-100 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-md border border-gray-700/50">
                            ${data.response}
                            ${data.match_score ? `<div class="text-[10px] text-gray-500 mt-2 font-mono">Distance Score: ${data.match_score.toFixed(4)}</div>` : ''}
                        </div>
                    </div>
                `;
            } catch (error) {
                typingIndicator.classList.add("hidden");
                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-red-900/50 text-red-200 border border-red-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm">
                            Error: Unable to connect to system engine.
                        </div>
                    </div>
                `;
            }
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
